[package]
name = "dama-core"
version = "0.1.0"
edition = "2021"

[dependencies]
libp2p = { version = "0.52", features = ["tcp", "tls", "noise", "yamux", "kad", "identify", "macros", "tokio"] }
tokio = { version = "1.0", features = ["full"] }
futures = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
# Добавляем Tor
arti-client = "0.10"
tor-rtcompat = "0.10"
x25519-dalek = "2.0"
aes-gcm = "0.10"
hkdf = "0.12"
sha2 = "0.10"
# База данных с шифрованием
rusqlite = { version = "0.29", features = ["bundled", "sqlcipher"] }
