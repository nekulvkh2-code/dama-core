[package]
name = "dama-core"
version = "0.1.0"
edition = "2021"

[dependencies]
libp2p = { version = "0.52", features = ["tcp", "tls", "noise", "yamux", "kad", "identify", "macros", "tokio"] }
tokio = { version = "1.0", features = ["full"] }
futures = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
# Добавляем Tor
arti-client = "0.10"
tor-rtcompat = "0.10"
